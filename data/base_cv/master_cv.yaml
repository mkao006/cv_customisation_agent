selected_projects:
  - name: Lead Scoring
    year: 2025
    company: Airwallex
    description: Spearheaded the development of an in-house ML lead scoring system, significantly reducing lost opportunities and increasing stakeholder buy-in by integrating advanced model explainability.
    details:
      - The problem was formulated as an ordianl regression where the prediction is grouped in to 4 tiers, 1 to 4 with Tier 1 being the highest value customer.
      - The target was created using customer data and we bin the gross profit into each tier based on alignment with the business.
      - We then train 3 xgboost models, one for each tier, to predict the probability of a lead being greater than each tier, we then average the probability to produce the final score. This is know as the Frank and Hall Method for converting ordinal regression into multiple binary predictions.
      - The scores are then mapped to the 4 tiers based on the recall and precission aligned with business.
    tools: ["Python", "DBT", "Airflow", "MLflow", "Spark", "Databricks", "xgboost"]
    keywords: ["ordinal regression", "supervised learning", "shapley value"]
  
